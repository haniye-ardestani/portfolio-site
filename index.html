<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minimal Portfolio</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- noise overlay -->
  <div class="noise"></div>

  <!-- header -->
  <header class="header">
    <div class="logo">HANIE ARDESTANI</div>

    <nav>
      <a href="#work">Work</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- hero -->
  <section class="hero">
    <p class="sub">GRAPHIC DESIGNER</p>
    <h1>
      Minimal design with emotional depth and clarity.
    </h1>
  </section>

  <!-- work -->
  <section id="work" class="work">
    <div class="card"><span>Project 01</span></div>
    <div class="card"><span>Project 02</span></div>
    <div class="card"><span>Project 03</span></div>
  </section>

  <!-- about -->
  <section id="about" class="about">
    <h2>About</h2>
    <p>
      I’m a graphic designer focused on minimal, conceptual branding and visual storytelling.
    </p>
  </section>

  <!-- contact -->
  <section id="contact" class="contact">
    <h2>Contact</h2>
    <p>email@example.com</p>
  </section>

  <!-- footer -->
  <footer>
    ©️ 2026 YOUR NAME
  </footer>

  <script src="script.js"></script>
</body>
</html>
